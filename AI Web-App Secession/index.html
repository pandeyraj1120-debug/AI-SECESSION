<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>School Student Registration</h2>

        <form>
            <label>Student Name</label>
            <input type="text" placeholder="Enter student name" required>

            <label>Father's Name</label>
            <input type="text" placeholder="Enter father's name" required>

            <label>Date of Birth</label>
            <input type="date" required>

            <label>Gender</label>
            <select required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label>Class</label>
            <input type="text" placeholder="Enter class" required>

            <label>Mobile Number</label>
            <input type="tel" placeholder="Enter mobile number" required>


            <label>Address</label>
            <textarea rows="4" placeholder="Enter address"></textarea>

            <button type="submit">Registor</button>


            <button type="submit">Reset</button>
        </form>
    </div>

</body>

</html>
